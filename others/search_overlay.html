<!--
  REQUIREMENTS TO MAKE SEARCH WORK:
    1. /index.json must exist at site root
       → run:  python others/generate_index.py
       → re-run whenever publications or pages are added
    2. Site must be served over HTTP/HTTPS (GitHub Pages, not file:///)
  ─────────────────────────────────────────────────────────────────────────────
     threshold:0.3  → allows slight fuzzy matching (typos etc.)
    Set threshold:0.0 for exact matches only
  ─────────────────────────────────────────────────────────────────────────────
  THE HTML (place at top of <body>, before navbar):
═══════════════════════════════════════════════════════════════════════════════
-->

<aside class="search-results" id="search">
  <div class="container">
    <section class="search-header">
      <div class="row no-gutters justify-content-between mb-3">
        <div class="col-6"><h1>Search</h1></div>
        <div class="col-6 col-search-close">
          <a class="js-search" href="#"><i class="fas fa-times-circle text-muted" aria-hidden="true"></i></a>
        </div>
      </div>
      <div id="search-box">
        <input name="q" id="search-query" placeholder="Search..."
               autocapitalize="off" autocomplete="off" autocorrect="off"
               spellcheck="false" type="search">
      </div>
    </section>
    <section class="section-search-results"><div id="search-hits"></div></section>
  </div>
</aside>
