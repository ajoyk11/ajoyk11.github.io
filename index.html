  <!-- AND post-filter: hides results missing any word from a multi-word query -->
  <script>
  (function () {
    var searchInput = document.getElementById("search-query");
    if (!searchInput) return;
    var observer = new MutationObserver(function () {
      var query = (searchInput.value || "").trim().toLowerCase();
      if (!query) return;
      var words = query.split(/\s+/).filter(function (w) { return w.length > 0; });
      if (words.length < 2) return;
      var hits = document.getElementById("search-hits");
      if (!hits) return;
      Array.from(hits.querySelectorAll(".search-hit")).forEach(function (el) {
        var text = (el.innerText || el.textContent || "").toLowerCase();
        var allMatch = words.every(function (w) { return text.indexOf(w) !== -1; });
        el.style.display = allMatch ? "" : "none";
      });
    });
    var hits = document.getElementById("search-hits");
    if (hits) { observer.observe(hits, { childList: true, subtree: true }); }
  })();
  </script>

  <!-- SECTION LOADER -->
  <script>
  (function () {
    var sections = [
      { id: "section-about",        file: "/about.html" },
      { id: "section-research",     file: "/research.html" },
      { id: "section-publications", file: "/publication/index-section.html" },
      { id: "section-experience",   file: "/experience.html" },
      /* { id: "section-skills",    file: "/skills.html" }, */
      { id: "section-contact",      file: "/contact.html" }
    ];
    sections.forEach(function (s) {
      fetch(s.file)
        .then(function (r) { return r.ok ? r.text() : Promise.reject(s.file + " not found"); })
        .then(function (html) {
          document.getElementById(s.id).innerHTML = html;
          if (typeof $.fn.scrollspy !== "undefined") { $("body").scrollspy("refresh"); }
          /* MAP FIX — re-init Leaflet after contact.html is injected */
          if (s.id === "section-contact") {
            setTimeout(function () {
              var lat    = document.getElementById("map-lat");
              var lng    = document.getElementById("map-lng");
              var zoom   = document.getElementById("map-zoom");
              var dir    = document.getElementById("map-dir");
              var mapDiv = document.getElementById("map");

              if (!lat || !lng || !mapDiv) return;
              if (typeof L === "undefined") return;
              if (mapDiv._leaflet_id) return;

              var m = L.map(mapDiv).setView([parseFloat(lat.value), parseFloat(lng.value)], zoom ? parseInt(zoom.value) : 13);

              L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
              }).addTo(m);

              var marker = L.marker([parseFloat(lat.value), parseFloat(lng.value)]).addTo(m);
              if (dir && dir.value) { marker.bindPopup(dir.value); } 
            }, 400);// remove .openPopup() from marker.bindPopup(dir.value).openPopup() if dont want open the map location 
          }
        })
        .catch(function (e) { console.warn("Section load error:", e); });
    });
  })();
  </script>
